name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Sora fonts
        run: |
          mkdir -p blip-fixed/app/src/main/res/font
          curl -L "https://github.com/tokotype/Sora/raw/master/fonts/ttf/Sora-Regular.ttf" -o blip-fixed/app/src/main/res/font/sora_regular.ttf
          curl -L "https://github.com/tokotype/Sora/raw/master/fonts/ttf/Sora-Medium.ttf" -o blip-fixed/app/src/main/res/font/sora_medium.ttf
          curl -L "https://github.com/tokotype/Sora/raw/master/fonts/ttf/Sora-SemiBold.ttf" -o blip-fixed/app/src/main/res/font/sora_semibold.ttf
          curl -L "https://github.com/tokotype/Sora/raw/master/fonts/ttf/Sora-Bold.ttf" -o blip-fixed/app/src/main/res/font/sora_bold.ttf

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p blip-fixed/gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" -o blip-fixed/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x blip-fixed/gradlew

      - name: Build Debug APK
        run: cd blip-fixed && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: blip-debug
          path: blip-fixed/app/build/outputs/apk/debug/*.apk
